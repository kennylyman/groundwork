name: Build Groundwork Windows Agent

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        shell: powershell
        run: |
          $v = (Get-Content VERSION).Trim()
          if (-not $v) { Write-Error "VERSION file is empty"; exit 1 }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "AGENT_VERSION=$v"

      - name: Bake version into agent/src/_version.py
        shell: powershell
        run: |
          $v = "${{ steps.version.outputs.version }}"
          @"
          # AUTO-GENERATED by .github/workflows/build.yml — do not edit.
          # Source of truth is the repo-root VERSION file.
          VERSION = "$v"
          "@ | Out-File -FilePath agent/src/_version.py -Encoding utf8

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyinstaller anthropic supabase mss pillow pynput cryptography python-dotenv psutil pywin32 pywinauto pytz

      # Hard gate: any failing test aborts the build before PyInstaller
      # runs. No .env is materialized, no artifact is uploaded, no
      # GitHub release is created, no agent_releases row is inserted.
      # The fleet only ever sees a release that passed every test.
      #
      # Runs on windows-latest so the winreg-mocked tests in
      # test_startup_registration.py actually execute (they're skipped
      # on the macOS dev box). pytest auto-discovers unittest.TestCase
      # classes, so the existing tests don't need rewriting.
      - name: Run agent tests
        working-directory: agent
        run: python -m pytest tests/ -v

      - name: Create .env file from secrets
        shell: powershell
        run: |
          @"
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EMPLOYEE_ID=${{ secrets.EMPLOYEE_ID }}
          BUSINESS_ID=${{ secrets.BUSINESS_ID }}
          "@ | Out-File -FilePath agent/src/.env -Encoding utf8

      - name: Build Windows executable
        run: pyinstaller agent/groundwork.spec --clean --distpath dist

      - name: Show dist contents
        shell: powershell
        run: Get-ChildItem -Recurse dist

      - name: Locate built exe
        id: exe
        shell: powershell
        run: |
          $exe = Get-ChildItem -Path dist -Recurse -Filter "Groundwork.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "Groundwork.exe not found in dist/"; exit 1 }
          "path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Built exe: $($exe.FullName)"

      - name: Upload executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Groundwork-Windows-exe
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "Groundwork Agent v${{ steps.version.outputs.version }}"
          body: "Build of agent v${{ steps.version.outputs.version }} from main @ ${{ github.sha }}"
          files: dist/**/*.exe
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Register release in Supabase
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AGENT_VERSION: ${{ steps.version.outputs.version }}
          AGENT_EXE_PATH: ${{ steps.exe.outputs.path }}
          # The "latest" tag is overwritten on every build, so this URL
          # always resolves to the freshest exe. sha256 in agent_releases
          # pins integrity per build.
          AGENT_DOWNLOAD_URL: "https://github.com/${{ github.repository }}/releases/download/latest/Groundwork.exe"
          AGENT_RELEASE_NOTES: "Build from main @ ${{ github.sha }}"
        run: python scripts/publish-release.py
