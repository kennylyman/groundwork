name: Build Groundwork Agent (Windows + Mac)

on:
  push:
    branches: [ main ]
    # Only rebuild when something that actually affects the agent binary
    # has changed. Dashboard-only PRs (lib/*, app/*, components/*) and
    # supabase migrations don't need a 3-minute Windows + Mac PyInstaller
    # cycle that also churns SHA256s in agent_releases. Triggered paths:
    #   - agent/**                — Python source, spec file, tests
    #   - scripts/publish-release.py — the DB upsert script
    #   - VERSION                 — bumps that the spec bakes into the binary
    #   - .github/workflows/build.yml — meta: changes to the workflow itself
    paths:
      - 'agent/**'
      - 'scripts/publish-release.py'
      - 'VERSION'
      - '.github/workflows/build.yml'

jobs:
  # ===========================================================================
  # Windows build
  # ===========================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        shell: powershell
        run: |
          $v = (Get-Content VERSION).Trim()
          if (-not $v) { Write-Error "VERSION file is empty"; exit 1 }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "AGENT_VERSION=$v"

      - name: Bake version into agent/src/_version.py
        shell: powershell
        run: |
          $v = "${{ steps.version.outputs.version }}"
          @"
          # AUTO-GENERATED by .github/workflows/build.yml — do not edit.
          # Source of truth is the repo-root VERSION file.
          VERSION = "$v"
          "@ | Out-File -FilePath agent/src/_version.py -Encoding utf8

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyinstaller anthropic supabase mss pillow pynput cryptography python-dotenv psutil pywin32 pywinauto pytz

      - name: Run agent tests
        working-directory: agent
        run: python -m pytest tests/ -v

      - name: Create .env file from secrets
        shell: powershell
        run: |
          @"
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EMPLOYEE_ID=${{ secrets.EMPLOYEE_ID }}
          BUSINESS_ID=${{ secrets.BUSINESS_ID }}
          "@ | Out-File -FilePath agent/src/.env -Encoding utf8

      - name: Build Windows executable
        run: pyinstaller agent/groundwork.spec --clean --distpath dist

      - name: Show dist contents
        shell: powershell
        run: Get-ChildItem -Recurse dist

      - name: Locate built exe
        id: exe
        shell: powershell
        run: |
          $exe = Get-ChildItem -Path dist -Recurse -Filter "Groundwork.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "Groundwork.exe not found in dist/"; exit 1 }
          "path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Built exe: $($exe.FullName)"

      - name: Upload executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Groundwork-Windows-exe
          path: dist/

      - name: Create / update Release (Windows)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "Groundwork Agent v${{ steps.version.outputs.version }}"
          body: "Build of agent v${{ steps.version.outputs.version }} from main @ ${{ github.sha }}"
          # NOTE: files intentionally omitted. softprops@v1 silently
          # drops uploads when an asset with the same name already
          # exists on the release (manifested in 19e02a77: the DB row
          # said sha=dd27910d but the served binary was still v0.5.8's
          # sha=8a832624). We use gh CLI --clobber below to force-
          # replace the asset on every build.
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force-upload .exe asset (overwrite)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # --clobber explicitly deletes the existing asset of the same
          # name before uploading the new one. softprops/action-gh-release
          # silently skips on conflict; gh CLI is the only reliable way
          # to guarantee the binary at /latest/Groundwork.exe matches
          # what publish-release.py just registered in agent_releases.
          gh release upload latest "${{ steps.exe.outputs.path }}" \
            --clobber --repo "${{ github.repository }}"

      - name: Register Windows release in Supabase
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AGENT_VERSION: ${{ steps.version.outputs.version }}
          AGENT_EXE_PATH: ${{ steps.exe.outputs.path }}
          AGENT_PLATFORM: windows
          # `latest` tag is overwritten every build; this URL always resolves
          # to the freshest Windows .exe. sha256 in agent_releases pins
          # integrity per build.
          AGENT_DOWNLOAD_URL: "https://github.com/${{ github.repository }}/releases/download/latest/Groundwork.exe"
          AGENT_RELEASE_NOTES: "Build from main @ ${{ github.sha }}"
        run: python scripts/publish-release.py

  # ===========================================================================
  # Mac build
  # ===========================================================================
  # Runs in parallel with the Windows build. Same code, same spec file
  # (the spec branches on sys.platform). Produces a single-file
  # `Groundwork` executable that we rename to `Groundwork-mac` before
  # upload so the GitHub Releases asset names don't collide with the
  # Windows `Groundwork.exe`.
  #
  # macos-latest currently runs arm64 (Apple Silicon). The binary works
  # on Apple Silicon out of the box; Intel Mac users would need a
  # universal2 build (see comment in groundwork.spec). For initial Mac
  # rollout we ship arm64-only since Comfort Keepers' Mac users on
  # newer hardware are the priority.
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: |
          v=$(cat VERSION | tr -d '[:space:]')
          [ -n "$v" ] || { echo "VERSION file is empty" >&2; exit 1; }
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "AGENT_VERSION=$v"

      - name: Bake version into agent/src/_version.py
        run: |
          v="${{ steps.version.outputs.version }}"
          cat > agent/src/_version.py <<EOF
          # AUTO-GENERATED by .github/workflows/build.yml — do not edit.
          # Source of truth is the repo-root VERSION file.
          VERSION = "$v"
          EOF

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # No pywin32 / pywinauto — Mac doesn't need them. pyobjc-core
          # and pyobjc-framework-Quartz pulled in transitively by pynput's
          # darwin backend; install explicitly so PyInstaller sees them.
          pip install pytest pyinstaller anthropic supabase mss pillow pynput cryptography python-dotenv psutil pytz pyobjc-core pyobjc-framework-Quartz

      - name: Run agent tests
        working-directory: agent
        run: python -m pytest tests/ -v

      - name: Create .env file from secrets
        run: |
          cat > agent/src/.env <<EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EMPLOYEE_ID=${{ secrets.EMPLOYEE_ID }}
          BUSINESS_ID=${{ secrets.BUSINESS_ID }}
          EOF

      - name: Build Mac executable
        run: pyinstaller agent/groundwork.spec --clean --distpath dist

      - name: Show dist contents
        run: ls -laR dist/

      - name: Rename + locate built binary
        id: binary
        run: |
          # PyInstaller produces dist/Groundwork (no extension). Rename
          # to Groundwork-mac so the release asset doesn't collide with
          # the Windows .exe.
          src=$(find dist -type f -name "Groundwork" | head -n 1)
          [ -n "$src" ] || { echo "Groundwork binary not found in dist/" >&2; exit 1; }
          renamed="$(dirname "$src")/Groundwork-mac"
          mv "$src" "$renamed"
          chmod +x "$renamed"
          echo "path=$renamed" >> "$GITHUB_OUTPUT"
          echo "Built Mac binary: $renamed"

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Groundwork-Mac-binary
          path: dist/

      - name: Create / update Release (Mac)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "Groundwork Agent v${{ steps.version.outputs.version }}"
          body: "Build of agent v${{ steps.version.outputs.version }} from main @ ${{ github.sha }}"
          # files omitted — see comment on the Windows job. softprops
          # doesn't reliably overwrite existing assets; gh CLI --clobber
          # below is the only guaranteed path.
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force-upload Mac binary (overwrite)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload latest "${{ steps.binary.outputs.path }}" \
            --clobber --repo "${{ github.repository }}"

      - name: Register Mac release in Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AGENT_VERSION: ${{ steps.version.outputs.version }}
          AGENT_EXE_PATH: ${{ steps.binary.outputs.path }}
          AGENT_PLATFORM: mac
          AGENT_DOWNLOAD_URL: "https://github.com/${{ github.repository }}/releases/download/latest/Groundwork-mac"
          AGENT_RELEASE_NOTES: "Build from main @ ${{ github.sha }}"
        run: python scripts/publish-release.py
