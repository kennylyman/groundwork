name: Build Groundwork Windows Agent

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller anthropic supabase mss pillow pynput cryptography python-dotenv psutil pywin32 pywinauto

      - name: Create .env file from secrets
        shell: powershell
        run: |
          @"
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EMPLOYEE_ID=${{ secrets.EMPLOYEE_ID }}
          BUSINESS_ID=${{ secrets.BUSINESS_ID }}
          "@ | Out-File -FilePath agent/src/.env -Encoding utf8

      - name: Copy Windows capture module
        run: copy agent\src\capture_windows.py agent\src\capture.py

      - name: Build Windows executable
        run: pyinstaller agent/groundwork.spec --clean --distpath dist

      - name: Show dist contents
        shell: powershell
        run: Get-ChildItem -Recurse dist

      - name: Upload executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Groundwork-Windows-exe
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Groundwork Agent — Latest
          files: dist/**/*.exe
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
